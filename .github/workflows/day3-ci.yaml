name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lighthouseci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Day 3/practice-app"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint
      - name: Run unit and accessibility tests
        run: npm test -- --ci --runInBand
      - run: npm run build
      - name: Run Pa11y accessibility checks
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 >/tmp/day3-preview.log 2>&1 &
          PREVIEW_PID=$!
          cleanup() {
            kill "$PREVIEW_PID" || true
          }
          trap cleanup EXIT
          READY=0
          ATTEMPT=1
          while [ "$ATTEMPT" -le 60 ]; do
            if ! kill -0 "$PREVIEW_PID" 2>/dev/null; then
              echo "Preview process exited before becoming ready."
              cat /tmp/day3-preview.log || true
              exit 1
            fi

            if curl -fsS http://127.0.0.1:4173 >/dev/null 2>&1; then
              READY=1
              break
            fi

            ATTEMPT=$((ATTEMPT + 1))
            sleep 1
          done

          if [ "$READY" -ne 1 ]; then
            echo "Preview server did not start in time."
            cat /tmp/day3-preview.log || true
            exit 1
          fi
          mkdir -p pa11y-reports
          cat > pa11y-ci.json <<'EOF'
          {
            "standard": "WCAG2AA",
            "chromeLaunchConfig": {
              "args": [
                "--no-sandbox",
                "--disable-setuid-sandbox",
                "--disable-dev-shm-usage"
              ]
            }
          }
          EOF
          set +e
          npx pa11y@9 http://127.0.0.1:4173 --config pa11y-ci.json --reporter html > pa11y-reports/pa11y-report.html
          PA11Y_EXIT=$?
          set -e
          exit $PA11Y_EXIT
      - name: Upload Day 3 Pa11y artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: day3-pa11y-report
          path: "Day 3/practice-app/pa11y-reports"
          if-no-files-found: warn
      - name: Collect Lighthouse reports
        run: npx @lhci/cli@0.15.x collect --staticDistDir=./dist --url=http://localhost/ --numberOfRuns=1 --outputDir=./lhci-reports
      - name: Assert Lighthouse thresholds
        run: npx @lhci/cli@0.15.x assert --assertions.categories:accessibility=error:0.9 --assertions.categories:performance=warn:0.6 --assertions.categories:best-practices=warn:0.8 --assertions.categories:seo=warn:0.8 --inputPath=./lhci-reports/*.json
      - name: Upload LHCI temp artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-temp
          path: "${{ github.workspace }}/Day 3/practice-app/.lighthouseci"
          include-hidden-files: true
          if-no-files-found: warn
