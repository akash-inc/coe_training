name: Day 2 CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  day2-practice-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Day 2/practice"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint
      - run: npm run build
