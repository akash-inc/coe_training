name: Day 4 CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  day4-vitest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Day 4/outside-in-tdd"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Run Vitest
        run: npm run test
